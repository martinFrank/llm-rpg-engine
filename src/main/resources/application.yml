spring:
  application:
    name: llm-rpg-engine

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://192.168.0.251:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}
          temperature: 0.8

# Application-specific tuning for the two agents.
rpg:
  verdict:
    model: ${VERDICT_MODEL:llama3.1}
    temperature: 0.3
  narrator:
    model: ${NARRATOR_MODEL:llama3.1}
    temperature: 0.9

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # Logs every prompt sent to Ollama and every response received (SimpleLoggerAdvisor).
    # Set to INFO to silence the LLM traffic, DEBUG to see it.
    org.springframework.ai.chat.client.advisor: DEBUG
