spring:
  application:
    name: llm-rpg-engine

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}
          temperature: 0.8

# Application-specific tuning for the two agents.
rpg:
  gamemaster:
    model: ${GAMEMASTER_MODEL:llama3.1}
    temperature: 0.3
  narrator:
    model: ${NARRATOR_MODEL:llama3.1}
    temperature: 0.9

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
