spring:
  application:
    name: llm-rpg-engine

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://192.168.0.251:11434}
      chat:
        options:
          model: "${OLLAMA_MODEL:qwen2.5:14b}"
          temperature: 0.8

# Application-specific tuning for the two agents.
# Available models on the server can be listed via: GET {base-url}/api/tags
rpg:
  verdict:
    # Rules engine: pure classification + id-copying, so a smaller/faster model is enough.
    # Low temperature for reliable structured JSON (Verdict).
    # Alternatives: qwen2.5:14b (slower, higher quality), qwen2.5:3b-instruct (even faster).
    #model: "${VERDICT_MODEL:qwen2.5:7b-instruct}"
    model: "${VERDICT_MODEL:qwen2.5:14b-instruct}"
    temperature: 0.3
  narrator:
    # Creative German prose, higher temperature.
    # Alternatives: gemma4:26b, qwen3.5:27b, llama4:latest.
    model: "${NARRATOR_MODEL:qwen2.5:14b}"
    temperature: 0.9
  talk:
    # In-character NPC dialogue: creative but must stay faithful to the scripted
    # dialog instructions, so a moderate temperature.
    model: "${TALK_MODEL:qwen2.5:14b}"
    temperature: 0.8

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # Logs every prompt sent to Ollama and every response received (SimpleLoggerAdvisor).
    # Set to INFO to silence the LLM traffic, DEBUG to see it.
    org.springframework.ai.chat.client.advisor: INFO
