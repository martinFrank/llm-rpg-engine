spring:
  application:
    name: llm-rpg-engine

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://192.168.0.251:11434}
      chat:
        options:
          model: "${OLLAMA_MODEL:qwen2.5:14b}"
          temperature: 0.8

# Application-specific tuning for the two agents.
# Available models on the server can be listed via: GET {base-url}/api/tags
rpg:
  verdict:
    # Rules engine: must return reliable structured JSON (Verdict). Strong instruction
    # following, low temperature. Alternatives: qwen2.5:7b-instruct, qwen3:14b.
    model: "${VERDICT_MODEL:qwen2.5:14b}"
    temperature: 0.3
  narrator:
    # Creative German prose, higher temperature.
    # Alternatives: gemma4:26b, qwen3.5:27b, llama4:latest.
    model: "${NARRATOR_MODEL:qwen2.5:14b}"
    temperature: 0.9

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # Logs every prompt sent to Ollama and every response received (SimpleLoggerAdvisor).
    # Set to INFO to silence the LLM traffic, DEBUG to see it.
    org.springframework.ai.chat.client.advisor: INFO
